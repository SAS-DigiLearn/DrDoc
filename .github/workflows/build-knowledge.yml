name: Build Knowledge Base & Deploy Static Site

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "tools/build-knowledge.js"
      - "package.json"
      - "index.html"
      - "data/**"
      - "images/**"

concurrency:
  group: build-sopbot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout repo
        uses: actions/checkout@v5

      # 2️⃣ Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      # 3️⃣ Cache npm dependencies
      - name: Cache npm
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # 4️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 5️⃣ Build knowledge.json
      - name: Build Knowledge Base
        run: npm run build

      # 6️⃣ Commit knowledge.json if it changed
      - name: Commit updated knowledge.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/knowledge.json
          git diff --cached --quiet || git commit -m "Update knowledge base"
          git push || echo "No changes to push"

      # 7️⃣ Deploy static site to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./      # publish the root (index.html + data + images)
          keep_files: true
